services:
  db:
    image: timescale/timescaledb:2.16.1-pg15
    environment:
      POSTGRES_USER: mes
      POSTGRES_PASSWORD: mes
      POSTGRES_DB: mes
    volumes:
      - db_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes"]
      interval: 5s
      retries: 10

  web:
    build: .
    command: ["sh", "-c", "node --import tsx scripts/migrate.ts && node server.js"]
    environment:
      DATABASE_URL: postgres://mes:mes@db:5432/mes
      SESSION_SECRET: ${SESSION_SECRET}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD}
      SUPERVISOR_PASSWORD: ${SUPERVISOR_PASSWORD}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD}
      PULSE_INGEST_TOKEN: ${PULSE_INGEST_TOKEN}
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      db: { condition: service_healthy }
    ports: ["3000:3000"]

  worker:
    build: .
    command: ["node", "dist/worker/worker/index.js"]
    environment:
      DATABASE_URL: postgres://mes:mes@db:5432/mes
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      db: { condition: service_healthy }

volumes:
  db_data:
