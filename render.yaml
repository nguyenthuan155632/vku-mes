databases:
  - name: vku-mes-db
    databaseName: mes
    user: mes
    plan: free

services:
  - type: web
    name: vku-mes-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    # Run migrations then start the Next.js server
    startCommand: sh -c "node --import tsx scripts/migrate.ts && node server.js"
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vku-mes-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPERVISOR_PASSWORD
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
      - key: VIEWER_PASSWORD
        sync: false
      - key: PULSE_INGEST_TOKEN
        generateValue: true
      - key: TZ
        value: Asia/Ho_Chi_Minh
      - key: NODE_ENV
        value: production

  - type: worker
    name: vku-mes-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    startCommand: node dist/worker/worker/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vku-mes-db
          property: connectionString
      - key: TZ
        value: Asia/Ho_Chi_Minh
      - key: NODE_ENV
        value: production
