databases:
  - name: vku-mes-db
    databaseName: mes
    user: mes
    plan: free

services:
  - type: web
    name: vku-mes-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HOSTNAME
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: vku-mes-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPERVISOR_PASSWORD
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
      - key: VIEWER_PASSWORD
        sync: false
      - key: PULSE_INGEST_TOKEN
        generateValue: true
      - key: TZ
        value: Asia/Ho_Chi_Minh
      - key: NODE_ENV
        value: production
